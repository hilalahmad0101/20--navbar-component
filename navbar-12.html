<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Modern SaaS Navbar - Mobile Preview</title>
    <!-- Tailwind CSS v3 CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <style data-purpose="custom-animations">
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Animation for the mobile menu expansion */
        .mobile-menu-enter {
            animation: slideDown 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .nav-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body class="bg-[#fcfcfd] font-sans antialiased text-[#1a1a1a]">
    <!-- BEGIN: MainNavbar -->
    <nav class="nav-blur border-b border-gray-200/60 sticky top-0 z-50" data-purpose="primary-navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 items-center">
                <!-- BEGIN: LogoSection -->
                <div class="flex-shrink-0 flex items-center gap-2.5" data-purpose="brand-identity">
                    <div class="w-7 h-7 bg-black rounded flex items-center justify-center shadow-sm">
                        <span class="text-white font-semibold text-sm">D</span>
                    </div>
                    <span class="text-[15px] font-semibold tracking-tight text-gray-900">DataStore</span>
                </div>
                <!-- END: LogoSection -->
                <!-- BEGIN: DesktopMenu -->
                <div class="hidden md:flex space-x-1 items-center" data-purpose="desktop-links">
                    <a class="text-gray-500 hover:text-black hover:bg-gray-50 px-3 py-1.5 rounded-md text-[13px] font-medium transition-all"
                        href="#">Features</a>
                    <a class="text-gray-500 hover:text-black hover:bg-gray-50 px-3 py-1.5 rounded-md text-[13px] font-medium transition-all"
                        href="#">Solutions</a>
                    <a class="text-gray-500 hover:text-black hover:bg-gray-50 px-3 py-1.5 rounded-md text-[13px] font-medium transition-all"
                        href="#">Pricing</a>
                    <div class="h-4 w-px bg-gray-200 mx-2"></div>
                    <a class="text-gray-500 hover:text-black px-3 py-1.5 text-[13px] font-medium transition-all"
                        href="#">Log in</a>
                    <a class="bg-black text-white px-3.5 py-1.5 rounded-md text-[13px] font-medium hover:bg-gray-800 transition-all shadow-[0_1px_2px_rgba(0,0,0,0.1)] active:scale-95 ml-1"
                        href="#">Get Started</a>
                </div>
                <!-- END: DesktopMenu -->
                <!-- BEGIN: MobileMenuButton -->
                <div class="md:hidden flex items-center">
                    <button aria-expanded="false"
                        class="inline-flex items-center justify-center p-1.5 rounded-md text-gray-500 hover:text-black hover:bg-gray-100 focus:outline-none transition-colors"
                        data-purpose="toggle-mobile-menu" id="mobile-menu-button" type="button">
                        <span class="sr-only">Open main menu</span>
                        <!-- Hamburger Icon -->
                        <svg class="block h-5 w-5" fill="none" id="icon-open" stroke="currentColor" stroke-width="2"
                            viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                        <!-- X Icon -->
                        <svg class="hidden h-5 w-5" fill="none" id="icon-close" stroke="currentColor" stroke-width="2"
                            viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                </div>
                <!-- END: MobileMenuButton -->
            </div>
        </div>
        <!-- BEGIN: MobileMenuOverlay -->
        <div class="hidden md:hidden bg-white/95 backdrop-blur-md border-b border-gray-100 mobile-menu-enter absolute top-full left-0 w-full shadow-xl"
            data-purpose="mobile-dropdown-content" id="mobile-menu">
            <div class="px-4 pt-3 pb-4 space-y-1">
                <a class="block px-3 py-2 rounded-lg text-[15px] font-medium text-black bg-gray-50"
                    href="#">Features</a>
                <a class="block px-3 py-2 rounded-lg text-[15px] font-medium text-gray-500 hover:text-black hover:bg-gray-50 transition-colors"
                    href="#">Solutions</a>
                <a class="block px-3 py-2 rounded-lg text-[15px] font-medium text-gray-500 hover:text-black hover:bg-gray-50 transition-colors"
                    href="#">Pricing</a>
                <div class="pt-4 mt-2 border-t border-gray-100 flex flex-col gap-2">
                    <a class="block w-full text-center px-4 py-2.5 rounded-lg border border-gray-200 text-[14px] font-medium text-gray-700 bg-white hover:bg-gray-50 transition-all active:scale-[0.98]"
                        href="#">Log in</a>
                    <a class="block w-full text-center px-4 py-2.5 rounded-lg text-[14px] font-medium text-white bg-black hover:bg-gray-800 transition-all active:scale-[0.98]"
                        href="#">Get Started</a>
                </div>
            </div>
        </div>
        <!-- END: MobileMenuOverlay -->
    </nav>
    <!-- END: MainNavbar -->
    <!-- BEGIN: ContentPlaceholder -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">
        <div
            class="text-center py-32 bg-white rounded-3xl border border-gray-200/60 shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
            <h1 class="text-4xl font-semibold text-gray-900 tracking-tight sm:text-5xl">
                Preview the Responsive Navbar
            </h1>
            <p class="mt-6 text-[17px] text-gray-500 max-w-lg mx-auto leading-relaxed">
                Experience the clean, minimal aesthetic of modern SaaS interfaces. Shrink your browser to test the
                mobile experience.
            </p>
        </div>
    </main>
    <!-- END: ContentPlaceholder -->
    <script data-purpose="mobile-menu-logic">
        const menuBtn = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const iconOpen = document.getElementById('icon-open');
        const iconClose = document.getElementById('icon-close');

        menuBtn.addEventListener('click', () => {
            const isExpanded = menuBtn.getAttribute('aria-expanded') === 'true';

            menuBtn.setAttribute('aria-expanded', !isExpanded);
            mobileMenu.classList.toggle('hidden');
            iconOpen.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        });

        document.addEventListener('DOMContentLoaded', () => {
            // Ensuring clean initial state
        });
    </script>
</body>

</html>
