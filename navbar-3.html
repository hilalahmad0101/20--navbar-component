<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Modern SaaS Ecommerce Navbar</title>
    <!-- Tailwind CSS v3 CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Inter font for that modern SaaS look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link {
            position: relative;
            transition: color 0.2s ease;
        }

        .nav-link:hover {
            color: #000;
        }

        /* Subtle glassmorphism for sticky header */
        .glass-header {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>

<body class="bg-[#fafafa] text-[#1a1a1a]">
    <!-- BEGIN: MainHeader -->
    <header class="w-full glass-header border-b border-gray-200/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- BEGIN: LeftSection -->
                <div class="flex items-center gap-8">
                    <!-- Logo -->
                    <div class="flex-shrink-0 flex items-center">
                        <a class="flex items-center space-x-2.5" data-purpose="logo-link" href="#">
                            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                                <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5"
                                    viewbox="0 0 24 24">
                                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                                        stroke-linecap="round" stroke-linejoin="round"></path>
                                </svg>
                            </div>
                            <span class="text-lg font-semibold tracking-tight text-black">Lumina</span>
                        </a>
                    </div>
                    <!-- Desktop Navigation -->
                    <nav class="hidden lg:flex items-center space-x-1">
                        <a class="nav-link px-3 py-2 text-sm font-medium text-gray-500 hover:text-black rounded-md transition-all hover:bg-gray-100/50"
                            href="#">Products</a>
                        <a class="nav-link px-3 py-2 text-sm font-medium text-gray-500 hover:text-black rounded-md transition-all hover:bg-gray-100/50"
                            href="#">Pricing</a>
                        <a class="nav-link px-3 py-2 text-sm font-medium text-gray-500 hover:text-black rounded-md transition-all hover:bg-gray-100/50"
                            href="#">Solutions</a>
                        <a class="nav-link px-3 py-2 text-sm font-medium text-gray-500 hover:text-black rounded-md transition-all hover:bg-gray-100/50"
                            href="#">Resources</a>
                    </nav>
                </div>
                <!-- END: LeftSection -->
                <!-- BEGIN: RightSection -->
                <div class="flex items-center space-x-3">
                    <!-- Search Container (Refined) -->
                    <div class="hidden md:block relative group" data-purpose="search-container">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-gray-400 group-focus-within:text-black transition-colors"
                                fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"
                                    stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                        <input
                            class="block w-48 lg:w-64 pl-9 pr-3 py-1.5 border border-gray-200 rounded-lg bg-gray-50/50 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black/5 focus:border-gray-400 focus:bg-white transition-all"
                            placeholder="Search..." type="text" />
                        <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
                            <kbd
                                class="hidden lg:inline-flex items-center px-1.5 font-sans text-[10px] font-medium text-gray-400 bg-white border border-gray-200 rounded">⌘K</kbd>
                        </div>
                    </div>
                    <!-- Divider -->
                    <div class="hidden sm:block h-6 w-px bg-gray-200 mx-2"></div>
                    <!-- Action Buttons -->
                    <button aria-label="Cart"
                        class="group relative p-2 text-gray-500 hover:text-black transition-colors rounded-full hover:bg-gray-100"
                        data-purpose="shopping-cart-btn" type="button">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                            <path
                                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
                                stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                        <span
                            class="absolute top-1 right-1 flex items-center justify-center h-4 w-4 rounded-full bg-black text-[9px] font-bold text-white shadow-sm">
                            3
                        </span>
                    </button>
                    <a class="hidden sm:flex px-4 py-1.5 text-sm font-medium text-white bg-black hover:bg-gray-800 rounded-lg transition-colors shadow-sm"
                        href="#">
                        Get Started
                    </a>
                    <!-- Mobile Menu Button -->
                    <button class="lg:hidden p-2 text-gray-500 hover:text-black rounded-lg hover:bg-gray-100"
                        data-purpose="mobile-menu-toggle" type="button">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                            <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                    </button>
                </div>
                <!-- END: RightSection -->
            </div>
        </div>
        <!-- BEGIN: MobileSearch (Only visible on small screens) -->
        <div class="md:hidden px-4 pb-3">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"
                            stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>
                <input
                    class="block w-full pl-9 pr-3 py-2 border border-gray-200 rounded-xl bg-gray-50/50 text-sm focus:outline-none focus:ring-2 focus:ring-black/5 focus:border-gray-300"
                    placeholder="Search documentation..." type="text" />
            </div>
        </div>
        <!-- END: MobileSearch -->
    </header>
    <!-- BEGIN: MobileMenu -->
    <div class="hidden lg:hidden border-t border-gray-200 bg-white" data-purpose="mobile-menu">
        <div class="px-4 pt-2 pb-4 space-y-1">
            <a class="block px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-black hover:bg-gray-50 rounded-lg"
                href="#">Products</a>
            <a class="block px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-black hover:bg-gray-50 rounded-lg"
                href="#">Pricing</a>
            <a class="block px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-black hover:bg-gray-50 rounded-lg"
                href="#">Solutions</a>
            <a class="block px-3 py-2.5 text-sm font-medium text-gray-600 hover:text-black hover:bg-gray-50 rounded-lg"
                href="#">Resources</a>
            <div class="pt-2 border-t border-gray-100">
                <a class="block w-full text-center px-4 py-2 text-sm font-medium text-white bg-black hover:bg-gray-800 rounded-lg transition-colors"
                    href="#">Get Started</a>
            </div>
        </div>
    </div>
    <!-- END: MobileMenu -->
    <!-- END: MainHeader -->
    <!-- Main Content Placeholder -->
    <main class="max-w-7xl mx-auto py-16 px-4">
        <div
            class="h-96 border border-dashed border-gray-200 rounded-2xl flex items-center justify-center text-gray-400 bg-white/50">
            Page Content Area
        </div>
    </main>
    <script data-purpose="mobile-menu-functionality">
        const toggle = document.querySelector('[data-purpose="mobile-menu-toggle"]');
        const menu = document.querySelector('[data-purpose="mobile-menu"]');

        toggle.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });
    </script>
</body>

</html>
