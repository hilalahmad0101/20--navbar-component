<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Modern SaaS Navbar</title>
    <!-- Tailwind CSS v3 CDN with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Inter Font for modern SaaS feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-link-transition {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-effect {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
</head>

<body class="bg-[#fcfcfd] antialiased">
    <!-- BEGIN: MainHeader -->
    <header class="sticky top-0 z-50 w-full border-b border-gray-200/60 glass-effect"
        data-purpose="main-navigation-header">
        <div class="mx-auto flex h-14 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <!-- BEGIN: LeftSection (Logo & Breadcrumbs) -->
            <div class="flex items-center space-x-4" data-purpose="navigation-branding">
                <!-- Site Logo -->
                <a aria-label="Home" class="flex items-center transition-opacity hover:opacity-80" href="/">
                    <div class="flex h-7 w-7 items-center justify-center rounded-lg bg-indigo-600 text-white shadow-[0_1px_2px_rgba(79,70,229,0.4)]"
                        data-purpose="logo-container">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 7v10c0 1.1.9 2 2 2h12a2 2 0 002-2V7M4 7a2 2 0 012-2h12a2 2 0 012 2M4 7l8 5 8-5"
                                stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </div>
                </a>
                <!-- Vertical Divider -->
                <div aria-hidden="true" class="h-4 w-px bg-gray-200/80"></div>
                <!-- Breadcrumbs Navigation -->
                <nav aria-label="Breadcrumb" class="flex" data-purpose="breadcrumb-nav">
                    <ol class="flex items-center space-x-1.5 text-[13px] font-medium tracking-tight" role="list">
                        <li>
                            <div class="flex items-center">
                                <a class="nav-link-transition text-gray-500 hover:text-gray-900" href="#">Home</a>
                            </div>
                        </li>
                        <li>
                            <div class="flex items-center">
                                <!-- Slash Separator (More modern than chevron) -->
                                <span class="text-gray-300 mx-1 select-none">/</span>
                                <a class="nav-link-transition text-gray-500 hover:text-gray-900" href="#">Dashboard</a>
                            </div>
                        </li>
                        <li>
                            <div class="flex items-center">
                                <span class="text-gray-300 mx-1 select-none">/</span>
                                <span aria-current="page" class="text-gray-900 font-semibold">Analytics</span>
                            </div>
                        </li>
                    </ol>
                </nav>
            </div>
            <!-- END: LeftSection -->
            <!-- BEGIN: RightSection (Utility Links) -->
            <div class="flex items-center space-x-3" data-purpose="user-utilities">
                <a class="nav-link-transition rounded-md px-3 py-1.5 text-[13px] font-medium text-gray-600 hover:bg-gray-100/80 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-200"
                    data-purpose="logout-link" href="/logout">
                    Log out
                </a>
            </div>
            <!-- END: RightSection -->
        </div>
    </header>
    <!-- END: MainHeader -->
    <!-- Placeholder for Page Content -->
    <main class="mx-auto max-w-7xl p-6 lg:p-10">
        <div
            class="rounded-xl border border-gray-200/60 bg-white p-20 shadow-[0_1px_3px_rgba(0,0,0,0.02),0_1px_2px_rgba(0,0,0,0.04)] text-center">
            <p class="text-[13px] font-medium text-gray-400 uppercase tracking-widest">Main Dashboard View</p>
        </div>
    </main>
</body>

</html>
