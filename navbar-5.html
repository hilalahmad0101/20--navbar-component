<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Modern SaaS Sidebar Navbar</title>
    <!-- Tailwind CSS v3 with Plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts for better typography: Inter for body, Geist-like feel -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <!-- Material Symbols for high-fidelity minimal icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <style data-purpose="typography">
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 20px;
        }
    </style>
    <style data-purpose="navigation-styles">
        /* Custom styles for tooltip positioning and hover effects */
        .nav-item {
            position: relative;
        }

        .nav-tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%) translateX(-10px);
            margin-left: 0.75rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .nav-item:hover .nav-tooltip {
            visibility: visible;
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        /* Active State Highlight - Sophisticated Stripe/Linear feel */
        .nav-item.active a {
            background-color: #f4f4f5;
            /* zinc-100 */
            color: #09090b;
            /* zinc-950 */
        }

        .nav-item.active a .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>

<body class="bg-[#fafafa] min-h-screen flex text-zinc-900">
    <!-- BEGIN: Vertical Sidebar -->
    <aside class="w-[72px] bg-white border-r border-zinc-200 flex flex-col items-center py-5 h-screen sticky top-0"
        data-purpose="sidebar-navigation">
        <!-- BEGIN: Brand Logo -->
        <div class="mb-8" data-purpose="brand-logo">
            <div
                class="w-9 h-9 bg-zinc-900 rounded-lg flex items-center justify-center text-white font-semibold text-lg shadow-sm">
                <span class="leading-none">D</span>
            </div>
        </div>
        <!-- END: Brand Logo -->
        <!-- BEGIN: Main Navigation Links -->
        <nav class="flex-1 flex flex-col gap-y-1.5 px-3" data-purpose="primary-nav-links">
            <!-- Home Link -->
            <div class="nav-item group active" data-purpose="nav-home">
                <a class="flex items-center justify-center w-10 h-10 rounded-lg text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900 transition-all duration-200"
                    href="#">
                    <span class="material-symbols-outlined">home</span>
                </a>
                <span
                    class="nav-tooltip px-2.5 py-1 bg-zinc-900 text-white text-[11px] font-medium rounded-md whitespace-nowrap shadow-xl border border-white/10">
                    Home
                </span>
            </div>
            <!-- Analytics Link -->
            <div class="nav-item group" data-purpose="nav-analytics">
                <a class="flex items-center justify-center w-10 h-10 rounded-lg text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900 transition-all duration-200"
                    href="#">
                    <span class="material-symbols-outlined">analytics</span>
                </a>
                <span
                    class="nav-tooltip px-2.5 py-1 bg-zinc-900 text-white text-[11px] font-medium rounded-md whitespace-nowrap shadow-xl border border-white/10">
                    Analytics
                </span>
            </div>
            <!-- Users Link -->
            <div class="nav-item group" data-purpose="nav-users">
                <a class="flex items-center justify-center w-10 h-10 rounded-lg text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900 transition-all duration-200"
                    href="#">
                    <span class="material-symbols-outlined">group</span>
                </a>
                <span
                    class="nav-tooltip px-2.5 py-1 bg-zinc-900 text-white text-[11px] font-medium rounded-md whitespace-nowrap shadow-xl border border-white/10">
                    Users
                </span>
            </div>
        </nav>
        <!-- END: Main Navigation Links -->
        <!-- BEGIN: Bottom Utilities -->
        <div class="flex flex-col gap-y-1.5 px-3 mt-auto" data-purpose="utility-nav-links">
            <!-- Settings Link -->
            <div class="nav-item group" data-purpose="nav-settings">
                <a class="flex items-center justify-center w-10 h-10 rounded-lg text-zinc-500 hover:bg-zinc-100 hover:text-zinc-900 transition-all duration-200"
                    href="#">
                    <span class="material-symbols-outlined">settings</span>
                </a>
                <span
                    class="nav-tooltip px-2.5 py-1 bg-zinc-900 text-white text-[11px] font-medium rounded-md whitespace-nowrap shadow-xl border border-white/10">
                    Settings
                </span>
            </div>
            <!-- User Profile Placeholder -->
            <div class="nav-item group pt-3 mb-2" data-purpose="nav-profile">
                <button
                    class="flex items-center justify-center w-9 h-9 rounded-full overflow-hidden border border-zinc-200 hover:border-zinc-400 transition-all duration-200 grayscale hover:grayscale-0">
                    <img alt="Profile" class="w-full h-full object-cover"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCazPAvOWYnfYVqWfi6U46UqQRrA5pTDVPWsjSLf4sqV9GtgnL8n7IKF-4dWQ0Zg7Ynjk0nSFmlpGe3gy4e6ooy_rwc8ixnkZ3VjshnbsboudA5TvWjysg7R-_usVB2H3Ic3m4ofZWs04M26JMNCEk1XoTo2caQQyqgXKchDxxlqGjx52Wy5KWIzO34XxopCPciQau1T4e03g7zhYvvCqVCUw_z-q4y0T0RUhCmrQrb72z7eKUKOfk8fzLQPX0wpUhvXaJLfhSFZ6cj" />
                </button>
                <span
                    class="nav-tooltip px-2.5 py-1 bg-zinc-900 text-white text-[11px] font-medium rounded-md whitespace-nowrap shadow-xl border border-white/10">
                    Profile
                </span>
            </div>
        </div>
        <!-- END: Bottom Utilities -->
    </aside>
    <!-- END: Vertical Sidebar -->
    <!-- BEGIN: Content Placeholder -->
    <main class="flex-1 p-10" data-purpose="main-content-area">
        <header class="mb-10 max-w-5xl mx-auto">
            <h1 class="text-xl font-semibold text-zinc-900 tracking-tight">Dashboard</h1>
            <p class="text-[14px] text-zinc-500 mt-1">Welcome back. Here is a brief overview of your performance.</p>
        </header>
        <!-- Empty State Content - Refined border and background -->
        <div
            class="max-w-5xl mx-auto border border-zinc-200 bg-white rounded-xl h-[75vh] flex items-center justify-center text-zinc-400 text-sm font-medium shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
            <div class="flex flex-col items-center gap-3">
                <span class="material-symbols-outlined text-zinc-300 !text-4xl">dashboard_customize</span>
                <span>Content Viewport</span>
            </div>
        </div>
    </main>
    <!-- END: Content Placeholder -->
</body>

</html>
